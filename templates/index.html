<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抖音视频解析</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.3s;
        }
        input:focus {
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .result {
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
            display: none;
        }
        .result.show {
            display: block;
        }
        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
        .error {
            margin-top: 15px;
            padding: 12px;
            background: #ffebee;
            color: #c62828;
            border-radius: 8px;
            display: none;
            font-size: 14px;
        }
        .error.show {
            display: block;
        }
        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>📹 抖音视频解析</h1>
            <p class="subtitle">输入抖音视频链接，获取无水印视频</p>
            
            <input type="text" id="urlInput" placeholder="请输入抖音视频链接...">
            <button id="parseBtn" onclick="parseVideo()">解析视频</button>
            
            <div class="error" id="error"></div>
            <div class="result" id="result">
                <p style="margin-bottom: 15px; color: #333;">解析成功！点击下方链接下载：</p>
                <a href="#" class="download-btn" id="downloadBtn" target="_blank">下载视频</a>
            </div>
        </div>
    </div>

    <script>
        async function parseVideo() {
            const url = document.getElementById('urlInput').value.trim();
            const parseBtn = document.getElementById('parseBtn');
            const error = document.getElementById('error');
            const result = document.getElementById('result');
            
            if (!url) {
                showError('请输入视频链接');
                return;
            }
            
            parseBtn.disabled = true;
            parseBtn.innerHTML = '解析中...';
            error.classList.remove('show');
            result.classList.remove('show');
            
            try {
                const response = await fetch('/api/parse', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    document.getElementById('downloadBtn').href = data.video_url;
                    result.classList.add('show');
                } else {
                    showError(data.error || '解析失败');
                }
            } catch (e) {
                showError('网络错误，请重试');
            } finally {
                parseBtn.disabled = false;
                parseBtn.innerHTML = '解析视频';
            }
        }
        
        function showError(msg) {
            const error = document.getElementById('error');
            error.textContent = msg;
            error.classList.add('show');
        }
        
        document.getElementById('urlInput').addEventListener('keyup', function(e) {
            if (e.key === 'Enter') parseVideo();
        });
    </script>
</body>
</html>
