<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全网视频无水印下载</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }
        
        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }
        
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        input[type="url"] {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        input[type="url"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        button {
            padding: 15px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .result {
            display: none;
            margin-top: 20px;
        }
        
        .result.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .video-info {
            padding: 20px;
            background: #f5f7fa;
            border-radius: 12px;
        }
        
        .video-info h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .info-label {
            color: #666;
        }
        
        .info-value {
            color: #333;
            font-weight: 500;
        }
        
        .download-btn {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 24px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
        }
        
        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        
        .platforms {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        
        .platform-tag {
            background: #e3f2fd;
            color: #1976d2;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        
        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 全网视频无水印下载</h1>
            <p>支持抖音、快手、B站、小红书、皮皮虾、微博等平台</p>
        </div>
        
        <div class="card">
            <div class="input-group">
                <input type="url" id="videoUrl" placeholder="粘贴视频链接...">
                <button id="parseBtn" onclick="parseVideo()">解析</button>
            </div>
            
            <div class="platforms">
                <span class="platform-tag">抖音</span>
                <span class="platform-tag">快手</span>
                <span class="platform-tag">B站</span>
                <span class="platform-tag">小红书</span>
                <span class="platform-tag">皮皮虾</span>
                <span class="platform-tag">微博</span>
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>正在解析视频...</p>
            </div>
            
            <div id="result" class="result"></div>
        </div>
    </div>
    
    <script>
        async function parseVideo() {
            const url = document.getElementById('videoUrl').value.trim();
            
            if (!url) {
                alert('请输入视频链接');
                return;
            }
            
            const loading = document.getElementById('loading');
            const result = document.getElementById('result');
            const parseBtn = document.getElementById('parseBtn');
            
            loading.style.display = 'block';
            result.classList.remove('show');
            parseBtn.disabled = true;
            
            try {
                const response = await fetch('/api/parse', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ url: url })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    result.innerHTML = `
                        <div class="video-info">
                            <h3>📹 ${data.data.title}</h3>
                            <div class="info-item">
                                <span class="info-label">平台</span>
                                <span class="info-value">${data.data.platform}</span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">时长</span>
                                <span class="info-value">${data.data.duration} 秒</span>
                            </div>
                            <a href="${data.data.url}" class="download-btn" target="_blank">下载视频</a>
                        </div>
                    `;
                    result.classList.add('show');
                } else {
                    result.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                    result.classList.add('show');
                }
            } catch (error) {
                result.innerHTML = `<div class="error">❌ 网络错误: ${error.message}</div>`;
                result.classList.add('show');
            } finally {
                loading.style.display = 'none';
                parseBtn.disabled = false;
            }
        }
        
        document.getElementById('videoUrl').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                parseVideo();
            }
        });
    </script>
</body>
</html>
