<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频去重工具</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 40px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        .upload-area:hover { border-color: #007bff; }
        .preview-container { margin-bottom: 20px; text-align: center; }
        .preview-container video { max-width: 100%; max-height: 300px; border-radius: 8px; }
        .file-info { margin-top: 10px; color: #666; }
        .intensity-select { margin-bottom: 20px; }
        .intensity-select label { display: block; margin-bottom: 10px; font-weight: bold; }
        .intensity-select select { width: 100%; padding: 10px; font-size: 16px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; padding: 10px 20px; font-size: 16px; width: 100%; }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }
        .status { margin-top: 20px; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .loading { background: #d1ecf1; color: #0c5460; }
        .result-video { max-width: 100%; max-height: 300px; border-radius: 8px; margin-top: 10px; }
        .download-btn { display: inline-block; padding: 10px 20px; background: #28a745; color: white; border-radius: 5px; text-decoration: none; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>🎬 视频去重工具</h1>
    
    <div class="upload-area" id="upload-area">
        <p>📤 点击或拖拽上传视频</p>
        <small>支持: MP4, AVI, MOV, MKV, FLV, WMV, WebM</small>
    </div>
    <input type="file" id="file-input" accept="video/*" style="display: none;">
    
    <div class="preview-container" id="preview-container" style="display: none;">
        <video id="preview-video" controls></video>
        <div class="file-info" id="file-info"></div>
    </div>
    
    <div class="intensity-select">
        <label for="intensity">去重强度：</label>
        <select id="intensity">
            <option value="low">低 - 轻微修改</option>
            <option value="medium" selected>中 - 标准修改</option>
            <option value="high">高 - 深度修改</option>
        </select>
    </div>
    
    <button id="convert-btn" disabled>开始去重</button>
    
    <div class="status" id="status" style="display: none;"></div>
    
    <script>
        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const convertBtn = document.getElementById('convert-btn');
        const status = document.getElementById('status');
        const intensitySelect = document.getElementById('intensity');
        const previewContainer = document.getElementById('preview-container');
        const previewVideo = document.getElementById('preview-video');
        const fileInfo = document.getElementById('file-info');
        
        let selectedFile = null;
        
        uploadArea.addEventListener('click', () => fileInput.click());
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#007bff';
        });
        
        uploadArea.addEventListener('dragleave', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#ccc';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.borderColor = '#ccc';
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });
        
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });
        
        function handleFile(file) {
            selectedFile = file;
            
            const url = URL.createObjectURL(file);
            previewVideo.src = url;
            previewContainer.style.display = 'block';
            uploadArea.style.display = 'none';
            
            const size = (file.size / (1024 * 1024)).toFixed(2);
            fileInfo.textContent = `文件名: ${file.name} | 大小: ${size} MB`;
            
            convertBtn.disabled = false;
        }
        
        convertBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            
            status.style.display = 'block';
            status.className = 'status loading';
            status.textContent = '⏳ 正在处理视频，请稍候...';
            convertBtn.disabled = true;
            
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('intensity', intensitySelect.value);
            
            try {
                const res = await fetch('/api/video/dedup', { method: 'POST', body: formData });
                const data = await res.json();
                
                if (data.code === 200) {
                    status.className = 'status success';
                    status.innerHTML = `
                        ✅ 去重成功！<br>
                        <video class="result-video" controls src="/api/video/download?file_id=${data.data.file_id}"></video>
                        <br>
                        <a href="/api/video/download?file_id=${data.data.file_id}" download="${data.data.new_name}" class="download-btn">📥 下载视频</a>
                    `;
                } else {
                    status.className = 'status error';
                    status.textContent = '❌ ' + (data.msg || data.detail || '处理失败');
                    convertBtn.disabled = false;
                }
            } catch (e) {
                status.className = 'status error';
                status.textContent = '❌ 处理失败: ' + e.message;
                convertBtn.disabled = false;
            }
        });
        
        fetch('/health').then(r => r.json()).then(d => console.log('服务状态:', d.msg));
    </script>
</body>
</html>
